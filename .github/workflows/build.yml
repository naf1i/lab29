name: Build Kivy App

# Запуск при пуше в main или при создании релиза
on:
  push:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:  # Позволяет запускать вручную из интерфейса GitHub

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install "kivy[base]" kivy_examples
    
    - name: Build with PyInstaller
      run: |
        pyinstaller --onedir --name MyApp --collect-data kivy main.py
    
    - name: Copy resources
      run: |
        xcopy resources dist\MyApp\resources /E /I
    
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyApp-Windows
        path: dist/MyApp

  build-macos:
    name: Build macOS APP
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # Workaround для macOS (используем pygame для отображения)
        pip install pygame
        pip install "kivy[base]" --no-binary kivy
    
    - name: Build with PyInstaller
      run: |
        pyinstaller --onedir --name MyApp --windowed --collect-data kivy main.py
    
    - name: Copy resources
      run: |
        cp -r resources dist/MyApp.app/Contents/Resources/
    
    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyApp-macOS
        path: dist/MyApp.app

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        # Установка Homebrew зависимостей
        brew install autoconf automake libtool pkg-config
        
        python -m pip install --upgrade pip
        pip install Cython==0.29.36
        pip install kivy-ios
        
    - name: Create Xcode project
      run: |
        python -m kivy_ios.toolchain create MyApp ${{ github.workspace }}
        python -m kivy_ios.toolchain build MyApp
        
    - name: Build IPA (simulator)
      run: |
        cd MyApp-ios
        xcodebuild -workspace MyApp.xcworkspace -scheme MyApp -configuration Debug -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15 Pro' build
    
    - name: Upload iOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyApp-iOS
        path: MyApp-ios/build/Release-iphonesimulator/MyApp.app

  create-release:
    name: Create Release Assets
    needs: [build-windows, build-macos, build-ios]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Zip artifacts for release
      run: |
        cd artifacts
        zip -r ../MyApp-Windows.zip MyApp-Windows/
        zip -r ../MyApp-macOS.zip MyApp-macOS/
        zip -r ../MyApp-iOS.zip MyApp-iOS/
    
    - name: Upload to release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          MyApp-Windows.zip
          MyApp-macOS.zip
          MyApp-iOS.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
